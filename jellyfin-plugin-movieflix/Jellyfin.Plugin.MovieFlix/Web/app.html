<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>MovieFlix for Jellyfin</title>
    <style>
        :root {
            color-scheme: dark;
            --bg: #101114;
            --surface: #18191c;
            --surface-2: #1f2024;
            --line: rgba(255,255,255,0.08);
            --text: #f5f5f5;
            --muted: #a1a1aa;
            --accent: #e50914;
        }
        * { box-sizing: border-box; }
        html, body {
            margin: 0;
            min-height: 100%;
            background: var(--bg);
            color: var(--text);
            font: 14px/1.5 ui-sans-serif, system-ui, sans-serif;
        }
        body.embedded {
            background: transparent;
        }
        .shell {
            max-width: 1440px;
            margin: 0 auto;
            width: 100%;
            padding: 0 24px 24px;
        }
        .topbar {
            border-bottom: 1px solid var(--line);
            background: rgba(12, 12, 14, 0.92);
            backdrop-filter: blur(8px);
        }
        body.embedded .topbar {
            display: none;
        }
        .toolbar {
            display: grid;
            grid-template-columns: minmax(0, 1fr) 180px 120px;
            gap: 12px;
            align-items: center;
            padding: 18px 0;
        }
        .brand {
            font-size: 22px;
            font-weight: 700;
            letter-spacing: -0.03em;
        }
        .brand span { color: var(--accent); }
        .subtle {
            margin-top: 6px;
            color: var(--muted);
            font-size: 13px;
        }
        .layout {
            display: grid;
            grid-template-columns: 360px minmax(0, 1fr);
            gap: 18px;
            padding-top: 18px;
        }
        body.embedded .layout {
            padding-top: 0;
            grid-template-columns: 320px minmax(0, 1fr);
            min-height: 100vh;
        }
        .rail, .viewer {
            border: 1px solid var(--line);
            background: var(--surface);
            min-height: 0;
        }
        .panel-head {
            padding: 16px 18px;
            border-bottom: 1px solid var(--line);
        }
        .search-grid {
            display: grid;
            grid-template-columns: minmax(0, 1fr) 120px;
            gap: 10px;
            margin-top: 12px;
        }
        .search-grid.secondary {
            grid-template-columns: minmax(0, 1fr) minmax(0, 1fr);
            margin-top: 10px;
        }
        input, select, button {
            height: 42px;
            border: 1px solid var(--line);
            background: var(--surface-2);
            color: var(--text);
            padding: 0 12px;
            font: inherit;
        }
        button {
            background: var(--accent);
            border-color: var(--accent);
            font-weight: 600;
            cursor: pointer;
        }
        button.secondary {
            background: var(--surface-2);
            border-color: var(--line);
            color: var(--text);
        }
        .result-list {
            overflow: auto;
            max-height: min(70vh, calc(100vh - 260px));
        }
        body.embedded .result-list {
            max-height: calc(100vh - 180px);
        }
        .result {
            display: grid;
            grid-template-columns: 52px minmax(0, 1fr);
            gap: 12px;
            width: 100%;
            padding: 12px 18px;
            border-bottom: 1px solid var(--line);
            background: transparent;
            text-align: left;
        }
        .result:hover,
        .result.active {
            background: rgba(255,255,255,0.04);
        }
        .thumb {
            width: 52px;
            aspect-ratio: 2 / 3;
            object-fit: cover;
            background: #23242a;
        }
        .title {
            font-size: 13px;
            font-weight: 600;
            line-height: 1.35;
        }
        .line {
            margin-top: 4px;
            font-size: 12px;
            color: var(--muted);
        }
        .viewer {
            display: grid;
            grid-template-rows: auto auto 1fr;
            min-height: min(70vh, calc(100vh - 130px));
        }
        body.embedded .viewer {
            min-height: calc(100vh - 2px);
        }
        .viewer-head {
            padding: 16px 18px;
            border-bottom: 1px solid var(--line);
        }
        .viewer-title {
            font-size: 18px;
            font-weight: 600;
            letter-spacing: -0.02em;
        }
        .viewer-actions {
            display: flex;
            gap: 8px;
            padding: 12px 18px;
            border-bottom: 1px solid var(--line);
        }
        .frame-wrap {
            position: relative;
            min-height: 360px;
            background: #000;
        }
        iframe {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            border: 0;
            background: #000;
        }
        .empty {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100%;
            color: var(--muted);
            padding: 24px;
            text-align: center;
        }
        @media (max-width: 980px) {
            .toolbar { grid-template-columns: 1fr; }
            .layout { grid-template-columns: 1fr; }
            .result-list { max-height: none; }
            .viewer { min-height: 520px; }
        }
    </style>
</head>
<body>
    <div class="topbar">
        <div class="shell">
            <div class="toolbar">
                <div>
                    <div class="brand">Movie<span>Flix</span> for Jellyfin</div>
                    <div class="subtle">Search TMDB, then play through Vidking first or the same backup providers used by MovieFlix.</div>
                </div>
                <div></div>
                <div></div>
            </div>
        </div>
    </div>

    <div class="shell layout">
        <section class="rail">
            <div class="panel-head">
                <div class="title" style="font-size:16px">Search</div>
                <div class="search-grid">
                    <input id="query" type="search" placeholder="Search movies or series" />
                    <button id="searchBtn" type="button">Search</button>
                </div>
                <div class="search-grid secondary">
                    <select id="mediaType">
                        <option value="">All</option>
                        <option value="movie">Movies</option>
                        <option value="tv">TV</option>
                    </select>
                    <select id="provider">
                        <option value="vidking">Vidking</option>
                        <option value="vidsrc">VidSrc</option>
                        <option value="multiembed">MultiEmbed</option>
                        <option value="moviesapi">MoviesAPI</option>
                    </select>
                </div>
            </div>
            <div id="results" class="result-list">
                <div class="empty">Search for a title to begin.</div>
            </div>
        </section>

        <section class="viewer">
            <div class="viewer-head">
                <div id="viewerTitle" class="viewer-title">Select a title</div>
                <div id="viewerSubtitle" class="subtle">Playback will load inside this view.</div>
            </div>
            <div class="viewer-actions">
                <button id="playInline" type="button">Play Here</button>
                <button id="openMovieFlix" type="button" class="secondary">Open in MovieFlix</button>
            </div>
            <div id="viewerFrameWrap" class="frame-wrap">
                <div class="empty">Pick a result from the left rail.</div>
            </div>
        </section>
    </div>

    <script>
        (function () {
            const params = new URLSearchParams(window.location.search);
            if (params.get('embedded') === '1') {
                document.body.classList.add('embedded');
            }
        })();
    </script>
    <script src="/MovieFlix/Web/Client.js"></script>
</body>
</html>
