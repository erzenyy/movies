<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>MovieFlix for Jellyfin</title>
    <style>
        :root {
            color-scheme: dark;
            --bg: #0b0b0c;
            --panel: #101012;
            --line: rgba(255,255,255,0.08);
            --text: #f4f4f5;
            --muted: #9f9fa9;
            --accent: #e50914;
        }
        * { box-sizing: border-box; }
        html, body {
            margin: 0;
            min-height: 100%;
            background: var(--bg);
            color: var(--text);
            font: 14px/1.5 ui-sans-serif, system-ui, sans-serif;
        }
        body {
            display: grid;
            grid-template-rows: auto 1fr;
        }
        .shell {
            max-width: 1400px;
            margin: 0 auto;
            width: 100%;
            padding: 0 20px 28px;
        }
        .topbar {
            border-bottom: 1px solid var(--line);
            background: rgba(8, 8, 9, 0.94);
            backdrop-filter: blur(8px);
        }
        .toolbar {
            display: grid;
            grid-template-columns: minmax(0, 1fr) 180px 120px;
            gap: 12px;
            align-items: center;
            padding: 18px 0;
        }
        .brand {
            font-size: 22px;
            font-weight: 700;
            letter-spacing: -0.03em;
        }
        .brand span { color: var(--accent); }
        .subtle {
            margin-top: 6px;
            color: var(--muted);
            font-size: 13px;
        }
        .search {
            display: grid;
            grid-template-columns: minmax(0, 1fr) 150px 110px;
            gap: 10px;
        }
        input, select, button {
            height: 42px;
            border: 1px solid var(--line);
            background: #111114;
            color: var(--text);
            padding: 0 12px;
            font: inherit;
        }
        button {
            background: var(--accent);
            border-color: var(--accent);
            font-weight: 600;
            cursor: pointer;
        }
        .content {
            display: grid;
            grid-template-columns: minmax(0, 1fr) minmax(320px, 420px);
            gap: 20px;
            padding-top: 20px;
        }
        .results {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
            gap: 14px;
            align-content: start;
        }
        .card {
            border: 1px solid var(--line);
            background: var(--panel);
            cursor: pointer;
            overflow: hidden;
        }
        .poster {
            aspect-ratio: 2 / 3;
            background: #18181b;
            width: 100%;
            object-fit: cover;
            display: block;
        }
        .meta {
            padding: 10px;
        }
        .title {
            font-size: 13px;
            font-weight: 600;
            line-height: 1.35;
        }
        .line {
            margin-top: 6px;
            color: var(--muted);
            font-size: 12px;
        }
        .viewer {
            border: 1px solid var(--line);
            background: #0d0d0f;
            min-height: 420px;
            display: grid;
            grid-template-rows: auto auto 1fr;
        }
        .viewer-head {
            padding: 16px;
            border-bottom: 1px solid var(--line);
        }
        .viewer-actions {
            display: flex;
            gap: 8px;
            padding: 12px 16px;
            border-bottom: 1px solid var(--line);
        }
        .viewer-actions button.secondary {
            background: #111114;
            border-color: var(--line);
            color: var(--text);
        }
        iframe {
            width: 100%;
            height: 100%;
            border: 0;
            background: #000;
        }
        .empty {
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--muted);
            padding: 24px;
            text-align: center;
        }
        @media (max-width: 980px) {
            .content { grid-template-columns: 1fr; }
            .toolbar, .search { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <div class="topbar">
        <div class="shell">
            <div class="toolbar">
                <div>
                    <div class="brand">Movie<span>Flix</span> for Jellyfin</div>
                    <div class="subtle">Search TMDB, then play with Vidking or the same backup providers used in the web app.</div>
                </div>
                <div class="search">
                    <input id="query" type="search" placeholder="Search movies or series" />
                    <select id="mediaType">
                        <option value="">All</option>
                        <option value="movie">Movies</option>
                        <option value="tv">TV</option>
                    </select>
                    <button id="searchBtn" type="button">Search</button>
                </div>
                <select id="provider">
                    <option value="vidking">Vidking</option>
                    <option value="vidsrc">VidSrc</option>
                    <option value="multiembed">MultiEmbed</option>
                    <option value="moviesapi">MoviesAPI</option>
                </select>
            </div>
        </div>
    </div>

    <div class="shell content">
        <div id="results" class="results"></div>
        <div class="viewer">
            <div class="viewer-head">
                <div id="viewerTitle" class="brand" style="font-size:18px">Select a title</div>
                <div id="viewerSubtitle" class="subtle">The selected title will load here for playback.</div>
            </div>
            <div class="viewer-actions">
                <button id="playInline" type="button">Play Here</button>
                <button id="openMovieFlix" type="button" class="secondary">Open in MovieFlix</button>
            </div>
            <div id="viewerFrameWrap" class="empty">Search for something, then choose a title.</div>
        </div>
    </div>

    <script src="/MovieFlix/Web/Client.js"></script>
</body>
</html>
