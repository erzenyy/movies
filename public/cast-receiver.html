<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>MovieFlix Receiver</title>
    <style>
      html,
      body {
        margin: 0;
        height: 100%;
        width: 100%;
        background: #050505;
        color: #f5f5f5;
        font-family: ui-sans-serif, system-ui, sans-serif;
      }
      body {
        display: grid;
        grid-template-rows: auto 1fr;
      }
      .topbar {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 16px;
        padding: 16px 20px;
        border-bottom: 1px solid rgba(255, 255, 255, 0.08);
        background: rgba(10, 10, 10, 0.88);
      }
      .brand {
        font-size: 14px;
        color: rgba(255, 255, 255, 0.56);
      }
      .meta {
        min-width: 0;
      }
      .title {
        font-size: 20px;
        font-weight: 600;
        line-height: 1.2;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }
      .subtitle {
        margin-top: 4px;
        font-size: 13px;
        color: rgba(255, 255, 255, 0.56);
      }
      .frame-wrap {
        position: relative;
        width: 100%;
        height: 100%;
        background: #000;
      }
      iframe {
        position: absolute;
        inset: 0;
        width: 100%;
        height: 100%;
        border: 0;
      }
      .empty {
        display: flex;
        align-items: center;
        justify-content: center;
        height: 100%;
        text-align: center;
        color: rgba(255, 255, 255, 0.6);
        padding: 24px;
      }
    </style>
    <script src="//www.gstatic.com/cast/sdk/libs/caf_receiver/v3/cast_receiver_framework.js"></script>
  </head>
  <body>
    <div class="topbar">
      <div class="meta">
        <div id="title" class="title">MovieFlix</div>
        <div id="subtitle" class="subtitle">Ready for casting</div>
      </div>
      <div id="provider" class="brand">Waiting for source</div>
    </div>
    <div class="frame-wrap">
      <div id="empty" class="empty">Select a title in MovieFlix and tap Cast.</div>
      <iframe id="receiver-frame" allowfullscreen referrerpolicy="no-referrer"></iframe>
    </div>

    <script>
      const context = cast.framework.CastReceiverContext.getInstance();
      const namespace = 'urn:x-cast:com.movieflix.remote';
      const frame = document.getElementById('receiver-frame');
      const empty = document.getElementById('empty');
      const title = document.getElementById('title');
      const subtitle = document.getElementById('subtitle');
      const provider = document.getElementById('provider');

      function renderPayload(payload) {
        if (!payload || !payload.embedUrl) return;
        title.textContent = payload.title || 'MovieFlix';
        subtitle.textContent = payload.subtitle || payload.mediaType || '';
        provider.textContent = payload.providerLabel || 'MovieFlix';
        frame.src = payload.embedUrl;
        empty.style.display = 'none';
      }

      context.addCustomMessageListener(namespace, (event) => {
        renderPayload(event.data || {});
      });

      context.start();
    </script>
  </body>
</html>
